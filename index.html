<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="description" content="HMNL直播讨论站 - 畅所欲言的直播话题社区，支持Markdown发帖与实时交流" />
    <meta name="theme-color" content="#2c3e50" />
    
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    
    <link rel="preconnect" href="https://nchat.live" />
    <link rel="dns-prefetch" href="https://nchat.live" />
    
    <title>HMNL直播讨论站</title>
    
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }
      
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow-x: hidden;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      
      #root {
        width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
      }
      
      .loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        min-height: 100vh;
        min-height: 100dvh;
      }
      
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #3498db;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        will-change: transform;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      .loading-text {
        color: #666;
        font-size: 14px;
      }
      
      .error {
        color: #e74c3c;
        font-size: 14px;
        text-align: center;
        padding: 1rem;
        background: #ffeaea;
        border-radius: 8px;
        margin: 1rem;
        max-width: 400px;
      }
      
      @media (max-width: 1024px) {
        html, body {
          overflow-x: hidden;
          width: 100%;
        }
      }
      
      @media (prefers-reduced-motion: reduce) {
        .spinner {
          animation: none;
          border: 3px solid #3498db;
        }
      }
    </style>
    
    <script>
      (function() {
        var perfMode = localStorage.getItem('performanceMode') === 'true';
        if (perfMode) {
          document.documentElement.classList.add('performance-mode-init');
        }
        
        if ('requestIdleCallback' in window) {
          requestIdleCallback(function() {
            var lazyScripts = document.querySelectorAll('script[data-src]');
            lazyScripts.forEach(function(script) {
              script.src = script.dataset.src;
            });
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div class="loading">
        <div class="spinner"></div>
        <p class="loading-text">正在加载...</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
